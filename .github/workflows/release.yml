name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - run: pnpm install

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Ingensrota app token
        id: ingensrota-token
        if: steps.changesets.outputs.published == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.INGENSROTA_APP_CLIENT_ID }}
          private-key: ${{ secrets.INGENSROTA_APP_PRIVATE_KEY }}
          owner: RevolutionaryWarrior
          repositories: Ingensrota
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout Ingensrota
        if: steps.changesets.outputs.published == 'true'
        uses: actions/checkout@v4
        with:
          repository: RevolutionaryWarrior/Ingensrota
          token: ${{ steps.ingensrota-token.outputs.token }}
          path: ingensrota

      - name: Update byuckchon frontend packages
        if: steps.changesets.outputs.published == 'true'
        working-directory: ingensrota
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");
          const packageVersions = new Map(
            publishedPackages
              .filter((pkg) => pkg.name.startsWith("@byuckchon-frontend/"))
              .map((pkg) => [pkg.name, pkg.version])
          );

          const dependencyFields = [
            "dependencies",
            "devDependencies",
            "peerDependencies",
            "optionalDependencies",
          ];
          const ignoredDirectories = new Set([
            ".git",
            "node_modules",
            "dist",
            "build",
            ".next",
          ]);
          const packageJsonFiles = [];

          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const entryPath = path.join(directory, entry.name);

              if (entry.isDirectory()) {
                if (!ignoredDirectories.has(entry.name)) {
                  walk(entryPath);
                }
                continue;
              }

              if (entry.name === "package.json") {
                packageJsonFiles.push(entryPath);
              }
            }
          }

          function nextRange(currentRange, version) {
            if (currentRange.startsWith("^")) return `^${version}`;
            if (currentRange.startsWith("~")) return `~${version}`;
            if (currentRange.startsWith(">=")) return `>=${version}`;
            return version;
          }

          walk(process.cwd());

          for (const filePath of packageJsonFiles) {
            const packageJson = JSON.parse(fs.readFileSync(filePath, "utf8"));
            let changed = false;

            for (const field of dependencyFields) {
              const dependencies = packageJson[field];

              if (!dependencies) {
                continue;
              }

              for (const [packageName, version] of packageVersions) {
                if (dependencies[packageName]) {
                  dependencies[packageName] = nextRange(dependencies[packageName], version);
                  changed = true;
                }
              }
            }

            if (changed) {
              fs.writeFileSync(filePath, `${JSON.stringify(packageJson, null, 2)}\n`);
            }
          }
          NODE

          # 조건 검증 없이 무조건 패키지 매니저 인스톨 실행
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --lockfile-only
          elif [ -f yarn.lock ]; then
            YARN_VERSION="$(yarn --version)"

            if [[ "$YARN_VERSION" == 1.* ]]; then
              yarn install --ignore-scripts
            else
              yarn install --mode=update-lockfile
            fi
          else
            npm install --package-lock-only
          fi

      - name: Generate Ingensrota library docs
        if: steps.changesets.outputs.published == 'true'
        working-directory: ingensrota
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LIBRARY_DOCS_AI_MODEL: ${{ vars.LIBRARY_DOCS_AI_MODEL }}
        run: |
          set -euo pipefail

          node ../scripts/generate-library-docs.cjs \
            --target . \
            --library-path src/consts/Portfolio/Library \
            --changed-only \
            --no-prune \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}"

      - name: Create Ingensrota Pull Request
        if: steps.changesets.outputs.published == 'true'
        working-directory: ingensrota
        env:
          GH_TOKEN: ${{ steps.ingensrota-token.outputs.token }}
          APP_SLUG: ${{ steps.ingensrota-token.outputs.app-slug }}
          PR_TITLE: "[feature] byuckchon-frontend-packages 업데이트"
          PR_BODY: |
            byuckchon-frontend-packages 릴리즈를 Ingensrota에 반영합니다.

            Published packages:
            ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          BASE_REF="${{ github.event.before }}"
          HEAD_REF="${{ github.sha }}"

          if [[ -z "$BASE_REF" || "$BASE_REF" =~ ^0+$ ]]; then
            BASE_REF="${HEAD_REF}^"
          fi

          CHANGED_PACKAGES="$(
            git -C .. diff --name-only "$BASE_REF" "$HEAD_REF" -- src/packages \
              | awk -F/ '
                  $1 == "src" && $2 == "packages" && $3 != "" {
                    print $3;
                  }
                ' \
              | sort -u
          )"
          CHANGED_PACKAGE_COUNT="$(printf "%s\n" "$CHANGED_PACKAGES" | sed "/^$/d" | wc -l | tr -d " ")"

          if [[ "$CHANGED_PACKAGE_COUNT" -eq 1 ]]; then
            BRANCH_TOPIC="$CHANGED_PACKAGES"
          elif [[ "$CHANGED_PACKAGE_COUNT" -gt 1 ]]; then
            BRANCH_TOPIC="multiple"
          else
            BRANCH_TOPIC="release"
          fi

          BRANCH_TOPIC="$(printf "%s" "$BRANCH_TOPIC" \
            | sed -E "s/[^A-Za-z0-9._-]+/-/g; s/^-+|-+$//g")"

          if [[ -z "$BRANCH_TOPIC" ]]; then
            BRANCH_TOPIC="release"
          fi

          BRANCH_NAME="feature/${BRANCH_TOPIC}-update-byuckchon-frontend-packages"

          APP_USER_ID="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"

          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH_NAME":"refs/remotes/origin/$BRANCH_NAME" || true
          git checkout -B "$BRANCH_NAME"
          git add -A
          
          git commit --allow-empty -m "chore: update byuckchon-frontend-packages"
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" --repo RevolutionaryWarrior/Ingensrota >/dev/null 2>&1; then
            gh pr edit "$BRANCH_NAME" \
              --repo RevolutionaryWarrior/Ingensrota \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          else
            gh pr create \
              --repo RevolutionaryWarrior/Ingensrota \
              --base main \
              --head "$BRANCH_NAME" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          fi
